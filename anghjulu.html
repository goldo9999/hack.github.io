<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCINET-X - iOS Tactical Terminal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React et ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap');
        
        :root {
            --ios-blur: blur(20px);
            --scp-green: #00ff66;
            --scp-red: #ff3b30;
        }

        body {
            background: radial-gradient(circle at top right, #1a1a1a, #000);
            font-family: 'Inter', sans-serif;
            margin: 0;
            color: white;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dock-glass {
            background: rgba(40, 40, 40, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Scanlines subtiles */
        .scanlines::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 99;
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
        }

        .ios-card {
            transition: transform 0.2s cubic-bezier(0.2, 0, 0.2, 1), background 0.2s;
        }
        .ios-card:active {
            transform: scale(0.96);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .dynamic-island {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        attrs: { class: className },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, className]);
            return <i data-lucide={name} ref={iconRef} {...props}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [threatLevel, setThreatLevel] = useState('EUKLID');
            const [isLogged, setIsLogged] = useState(false);
            const [time, setTime] = useState(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));

            useEffect(() => {
                const timer = setInterval(() => {
                    setTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            if (!isLogged) {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center relative overflow-hidden bg-black scanlines">
                        <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-green-900/20 blur-[120px] rounded-full"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-red-900/10 blur-[120px] rounded-full"></div>
                        
                        <div className="z-10 flex flex-col items-center animate-in fade-in zoom-in duration-1000">
                            <div className="w-24 h-24 mb-8 relative">
                                <div className="absolute inset-0 bg-green-500 blur-2xl opacity-20 animate-pulse"></div>
                                <div className="w-full h-full glass rounded-[2rem] flex items-center justify-center shadow-2xl border-white/20">
                                    <Icon name="shield-check" className="w-12 h-12 text-green-400" />
                                </div>
                            </div>
                            
                            <h1 className="text-3xl font-extrabold tracking-tighter mb-2">SCINET <span className="text-green-500 font-mono">X</span></h1>
                            <p className="text-white/40 text-sm font-medium mb-12 uppercase tracking-widest">Biometric Login Required</p>
                            
                            <button 
                                onClick={() => setIsLogged(true)}
                                className="glass px-10 py-4 rounded-full font-bold text-sm hover:bg-white/10 transition-all flex items-center gap-3 active:scale-90"
                            >
                                <Icon name="fingerprint" className="w-5 h-5 text-green-400" />
                                ANALYSE EMPREINTE
                            </button>
                            
                            <p className="mt-20 text-[10px] text-white/20 font-mono uppercase text-center max-w-[250px]">
                                Propriété de la Fondation SCP. Utilisation non autorisée = Protocole d'amnésie classe-A.
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen w-screen bg-black flex flex-col relative overflow-hidden scanlines">
                    {/* Status Bar */}
                    <div className="h-12 flex justify-between items-center px-8 z-50">
                        <div className="text-sm font-bold tracking-tight">{time}</div>
                        <div className="dynamic-island h-7 px-4 glass rounded-full flex items-center gap-2 group cursor-pointer hover:w-48">
                            <div className={`w-2 h-2 rounded-full ${threatLevel === 'KETER' ? 'bg-red-500 animate-pulse' : 'bg-green-500'}`}></div>
                            <span className="text-[10px] font-black tracking-widest uppercase truncate">{threatLevel} LEVEL</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <Icon name="signal" className="w-4 h-4 text-white/60" />
                            <Icon name="wifi" className="w-4 h-4 text-white/60" />
                            <div className="w-6 h-3 border border-white/30 rounded-[2px] relative">
                                <div className="absolute top-0.5 left-0.5 h-1.5 bg-green-500 rounded-[1px]" style={{width: '70%'}}></div>
                            </div>
                        </div>
                    </div>

                    {/* Main View */}
                    <main className="flex-1 overflow-y-auto px-6 pt-4 pb-32 custom-scrollbar">
                        <div className="max-w-4xl mx-auto">
                            {activeTab === 'home' && <HomeView setThreatLevel={setThreatLevel} />}
                            {activeTab === 'scps' && <SCPDossiers />}
                            {activeTab === 'missions' && <MissionsView />}
                            {activeTab === 'comms' && <CommsView />}
                        </div>
                    </main>

                    {/* Dock Navigation */}
                    <div className="absolute bottom-6 left-1/2 -translate-x-1/2 z-50">
                        <div className="dock-glass p-3 rounded-[2.5rem] flex items-center gap-2 shadow-2xl">
                            <DockIcon icon="layout-grid" active={activeTab === 'home'} onClick={() => setActiveTab('home')} color="bg-blue-500" />
                            <DockIcon icon="database" active={activeTab === 'scps'} onClick={() => setActiveTab('scps')} color="bg-orange-500" />
                            <DockIcon icon="target" active={activeTab === 'missions'} onClick={() => setActiveTab('missions')} color="bg-red-500" />
                            <DockIcon icon="message-square" active={activeTab === 'comms'} onClick={() => setActiveTab('comms')} color="bg-green-600" />
                            <div className="w-[1px] h-8 bg-white/10 mx-1"></div>
                            <DockIcon icon="power" active={false} onClick={() => setIsLogged(false)} color="bg-white/10" />
                        </div>
                    </div>
                </div>
            );
        };

        const DockIcon = ({ icon, active, onClick, color }) => (
            <button 
                onClick={onClick}
                className={`w-14 h-14 rounded-2xl flex items-center justify-center transition-all duration-300 relative group
                ${active ? 'scale-110 -translate-y-2' : 'hover:scale-110 hover:-translate-y-1'}`}
            >
                <div className={`absolute inset-0 rounded-2xl opacity-80 shadow-lg ${color}`}></div>
                <Icon name={icon} className={`relative z-10 w-6 h-6 ${active ? 'text-white' : 'text-white/80'}`} />
                {active && <div className="absolute -bottom-2 w-1 h-1 bg-white rounded-full"></div>}
            </button>
        );

        const HomeView = ({ setThreatLevel }) => (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 animate-in slide-in-from-bottom-8 duration-700">
                <div className="md:col-span-2 glass rounded-[2.5rem] p-8 flex flex-col md:flex-row items-center gap-8 shadow-inner">
                    <div className="w-32 h-32 glass rounded-full flex items-center justify-center border-green-500/30 relative">
                        <div className="absolute inset-0 border-4 border-green-500/20 border-t-green-500 rounded-full animate-spin"></div>
                        <Icon name="activity" className="w-12 h-12 text-green-400" />
                    </div>
                    <div>
                        <h2 className="text-2xl font-black mb-2 tracking-tight">Bonjour, Administrateur O5</h2>
                        <p className="text-white/40 text-sm leading-relaxed mb-4">Le Site-19 est actuellement sous protocole de confinement passif. Aucune brèche majeure détectée dans les dernières 24h.</p>
                        <div className="flex gap-2">
                            <span className="bg-green-500/20 text-green-400 text-[10px] font-bold px-3 py-1 rounded-full border border-green-500/20">SITE-19 ONLINE</span>
                            <span className="bg-blue-500/20 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-full border border-blue-500/20">NEURAL LINK OK</span>
                        </div>
                    </div>
                </div>

                <div className="glass rounded-[2rem] p-6 ios-card">
                    <h3 className="text-xs font-black text-white/30 uppercase tracking-widest mb-4">Ajuster Menace</h3>
                    <div className="grid grid-cols-2 gap-2">
                        {['SAFE', 'EUKLID', 'KETER', 'APOLLYON'].map(l => (
                            <button 
                                key={l} 
                                onClick={() => setThreatLevel(l)}
                                className="glass py-3 rounded-xl text-[10px] font-black hover:bg-white/5 transition-all active:bg-white/10"
                            >
                                {l}
                            </button>
                        ))}
                    </div>
                </div>

                <div className="glass rounded-[2rem] p-6 ios-card">
                    <h3 className="text-xs font-black text-white/30 uppercase tracking-widest mb-4">Statistiques Systèmes</h3>
                    <div className="space-y-3">
                        <SystemProgress label="Processeur Neural" val="42%" />
                        <SystemProgress label="Stockage Cloud" val="89%" color="bg-orange-500" />
                        <SystemProgress label="Liaison Satellite" val="100%" color="bg-green-500" />
                    </div>
                </div>
            </div>
        );

        const SystemProgress = ({ label, val, color = "bg-blue-500" }) => (
            <div className="space-y-1">
                <div className="flex justify-between text-[10px] font-bold px-1">
                    <span className="text-white/40 uppercase">{label}</span>
                    <span>{val}</span>
                </div>
                <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                    <div className={`h-full ${color} rounded-full transition-all duration-1000`} style={{width: val}}></div>
                </div>
            </div>
        );

        const SCPDossiers = () => (
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 animate-in fade-in duration-700">
                {[
                    { id: 'SCP-173', class: 'Euclid', title: 'La Sculpture', color: 'bg-orange-500' },
                    { id: 'SCP-682', class: 'Keter', title: 'Le Reptile Invulnérable', color: 'bg-red-500' },
                    { id: 'SCP-096', class: 'Euclid', title: 'L\'Homme Timide', color: 'bg-orange-500' },
                    { id: 'SCP-999', class: 'Safe', title: 'Le Monstre de Chatouilles', color: 'bg-green-500' }
                ].map(scp => (
                    <div key={scp.id} className="glass rounded-[2rem] p-6 ios-card flex items-center gap-6 group cursor-pointer">
                        <div className={`w-16 h-16 rounded-2xl ${scp.color} flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform`}>
                            <Icon name="database" className="text-white w-8 h-8" />
                        </div>
                        <div>
                            <div className="text-[10px] font-black opacity-30 uppercase tracking-widest">{scp.id}</div>
                            <h4 className="font-extrabold text-lg -mt-1">{scp.title}</h4>
                            <span className="text-[9px] font-bold bg-white/10 px-2 py-0.5 rounded-full">{scp.class}</span>
                        </div>
                    </div>
                ))}
            </div>
        );

        const MissionsView = () => (
            <div className="space-y-4 animate-in slide-in-from-right-8 duration-700">
                {[
                    { title: "Opération Ghost-Walker", site: "Site-17", danger: "Extrême", prog: 65 },
                    { title: "Récupération d'Anomalie", site: "Zone-D", danger: "Moyen", prog: 22 }
                ].map((m, i) => (
                    <div key={i} className="glass rounded-[2rem] p-6 flex flex-col md:flex-row items-center gap-6">
                        <div className="w-12 h-12 rounded-full glass border-red-500/40 flex items-center justify-center">
                            <Icon name="target" className="text-red-500 w-6 h-6" />
                        </div>
                        <div className="flex-1 text-center md:text-left">
                            <h4 className="font-black text-lg uppercase tracking-tight">{m.title}</h4>
                            <p className="text-[10px] text-white/30 font-bold uppercase tracking-widest">{m.site} • RISQUE {m.danger}</p>
                        </div>
                        <div className="w-full md:w-32 h-2 bg-white/5 rounded-full overflow-hidden">
                            <div className="h-full bg-red-600 rounded-full" style={{width: `${m.prog}%`}}></div>
                        </div>
                    </div>
                ))}
            </div>
        );

        const CommsView = () => (
            <div className="glass rounded-[2.5rem] p-2 h-[500px] flex flex-col animate-in zoom-in-95 duration-700">
                <div className="p-6 border-b border-white/10 flex items-center gap-3">
                    <div className="w-10 h-10 glass rounded-full flex items-center justify-center">
                        <Icon name="message-square" className="text-blue-400 w-5 h-5" />
                    </div>
                    <div>
                        <h4 className="font-bold text-sm tracking-tight">Communications Sécurisées</h4>
                        <div className="flex items-center gap-2">
                            <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                            <span className="text-[9px] text-white/30 font-bold uppercase">4 Flux actifs</span>
                        </div>
                    </div>
                </div>
                <div className="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
                    <ChatMessage user="DR. BRIGHT" msg="Est-ce que quelqu'un peut sortir SCP-999 de mon bureau ?" side="left" />
                    <ChatMessage user="SYS_ADMIN" msg="Alerte : Mise à jour du firmware des caméras de confinement terminée." side="right" />
                    <ChatMessage user="UNKNOWN" msg="Nous savons ce que vous cachez au Site-01." side="left" danger />
                </div>
                <div className="p-4 bg-white/5 m-2 rounded-[1.5rem] flex items-center gap-3">
                    <input type="text" placeholder="Entrer commande tactique..." className="bg-transparent flex-1 text-xs outline-none placeholder:text-white/10 uppercase font-medium" />
                    <button className="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center active:scale-90 transition-transform">
                        <Icon name="arrow-up" className="w-4 h-4 text-black" />
                    </button>
                </div>
            </div>
        );

        const ChatMessage = ({ user, msg, side, danger }) => (
            <div className={`flex flex-col ${side === 'right' ? 'items-end' : 'items-start'}`}>
                <span className="text-[9px] font-black opacity-30 uppercase tracking-widest px-2 mb-1">{user}</span>
                <div className={`max-w-[80%] p-4 rounded-3xl text-xs font-medium ${
                    danger ? 'bg-red-500 text-white shadow-lg shadow-red-500/20' : 
                    side === 'right' ? 'bg-white text-black' : 'glass text-white'
                }`}>
                    {msg}
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
