<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL SCINET-V4 - FONDATION SCP</title>
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React et ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel pour compiler le JSX dans le navigateur -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&display=swap');
        
        body {
            background-color: black;
            font-family: 'Fira+Code', monospace;
            margin: 0;
            overflow: hidden;
        }

        /* Effets CRT et Scanlines */
        .crt-overlay {
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 101;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(34, 197, 94, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            to { bottom: -100px; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #065f46; border-radius: 10px; }

        .terminal-flicker {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Composant Icône pour gérer Lucide sans imports ESM
        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        attrs: { class: className },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, className]);
            return <i data-lucide={name} ref={iconRef} {...props}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [threatLevel, setThreatLevel] = useState('EUKLID');
            const [isLogged, setIsLogged] = useState(false);
            const [logs, setLogs] = useState([
                "Initialisation de la liaison satellite...",
                "Accès sécurisé au Site-19 accordé.",
                "Interception d'un signal crypté dans le Secteur 4.",
                "Surveillance active du SCP-173 confirmée."
            ]);

            useEffect(() => {
                if (!isLogged) return;
                const interval = setInterval(() => {
                    const messages = [
                        "Alerte : Agent 04 déconnecté.",
                        "Intrusion Site-01 bloquée.",
                        "Rapport SCP-682 reçu.",
                        "Transfert O5 en cours...",
                        "Anomalie Aile Est détectée."
                    ];
                    setLogs(prev => [messages[Math.floor(Math.random() * messages.length)], ...prev.slice(0, 5)]);
                }, 5000);
                return () => clearInterval(interval);
            }, [isLogged]);

            if (!isLogged) {
                return (
                    <div className="min-h-screen bg-black flex items-center justify-center p-4 relative">
                        <div className="crt-overlay"></div>
                        <div className="scanline"></div>
                        <div className="max-w-md w-full border border-green-900 bg-black/80 p-8 relative z-10 shadow-[0_0_50px_rgba(0,100,0,0.2)]">
                            <div className="flex justify-center mb-6">
                                <div className="w-16 h-16 border-2 border-green-500 rounded-full flex items-center justify-center animate-pulse">
                                    <Icon name="shield-alert" className="text-green-500 w-10 h-10" />
                                </div>
                            </div>
                            <h1 className="text-green-500 text-center text-xl mb-8 tracking-[0.3em] font-bold">SCINET-V4</h1>
                            <div className="space-y-4">
                                <div className="border-b border-green-900 pb-2 flex items-center gap-2">
                                    <span className="text-green-800 text-xs font-bold uppercase">ID:</span>
                                    <input type="text" placeholder="O5-ADMIN" className="bg-transparent text-green-500 outline-none w-full placeholder:text-green-950 uppercase" />
                                </div>
                                <div className="border-b border-green-900 pb-2 flex items-center gap-2">
                                    <span className="text-green-800 text-xs font-bold uppercase">PWD:</span>
                                    <input type="password" placeholder="********" className="bg-transparent text-green-500 outline-none w-full placeholder:text-green-950" />
                                </div>
                                <button 
                                    onClick={() => setIsLogged(true)}
                                    className="w-full py-3 bg-green-900/20 text-green-500 border border-green-500 hover:bg-green-500 hover:text-black transition-all font-bold mt-4 tracking-widest"
                                >
                                    INITIALISER LIAISON
                                </button>
                            </div>
                            <p className="text-[9px] text-green-900 mt-8 text-center uppercase leading-tight">
                                Accès restreint. Le personnel non autorisé sera traité par agent mémétique.
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-black text-green-500 flex flex-col md:flex-row overflow-hidden relative">
                    <div className="crt-overlay"></div>
                    <div className="scanline"></div>
                    
                    {/* Sidebar */}
                    <nav className="w-full md:w-64 border-b md:border-b-0 md:border-r border-green-900 bg-black/90 flex flex-col z-20">
                        <div className="p-6 border-b border-green-900 flex items-center gap-3">
                            <Icon name="shield-alert" className="text-red-500 w-6 h-6 animate-pulse" />
                            <span className="font-bold tracking-tighter text-lg">SCINET-V4</span>
                        </div>
                        <div className="flex-1 py-4 overflow-y-auto">
                            <NavItem icon="activity" label="Dashboard" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                            <NavItem icon="database" label="Dossiers SCP" active={activeTab === 'scps'} onClick={() => setActiveTab('scps')} />
                            <NavItem icon="target" label="Missions" active={activeTab === 'missions'} onClick={() => setActiveTab('missions')} />
                            <NavItem icon="users" label="Personnel" active={activeTab === 'personnel'} onClick={() => setActiveTab('personnel')} />
                            <NavItem icon="message-square" label="Comms" active={activeTab === 'comms'} onClick={() => setActiveTab('comms')} />
                        </div>
                        <div className="p-4 border-t border-green-900 bg-green-950/10">
                            <div className="text-[10px] text-green-800 uppercase tracking-widest font-bold mb-1">Niveau d'accès</div>
                            <div className="text-xs font-bold text-red-500 animate-pulse">LEVEL 5 - OVERSEER</div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col z-10 overflow-hidden">
                        <header className="p-4 border-b border-green-900 flex justify-between items-center bg-black/80">
                            <div className="flex items-center gap-4">
                                <span className="text-[10px] text-green-800 font-bold">[ KERNEL_OK ]</span>
                                <div className="h-4 w-[1px] bg-green-900" />
                                <span className="text-xs flex items-center gap-2">
                                    <Icon name="wifi" className="w-3 h-3 text-green-500 animate-pulse" /> SITE-19_LINKED
                                </span>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="text-[10px] text-green-800 font-bold uppercase">Menace:</span>
                                <select 
                                    className="bg-black border border-green-900 text-xs text-orange-500 p-1 outline-none"
                                    value={threatLevel}
                                    onChange={(e) => setThreatLevel(e.target.value)}
                                >
                                    <option value="SAFE" className="text-green-500">SAFE</option>
                                    <option value="EUKLID" className="text-orange-500">EUKLID</option>
                                    <option value="KETER" className="text-red-500">KETER</option>
                                    <option value="APOLLYON" className="text-purple-500">APOLLYON</option>
                                </select>
                            </div>
                        </header>

                        <section className="p-6 flex-1 overflow-y-auto custom-scrollbar">
                            {activeTab === 'dashboard' && <Dashboard logs={logs} />}
                            {activeTab === 'scps' && <SCPDossiers />}
                            {activeTab === 'missions' && <MissionsView />}
                            {activeTab === 'personnel' && <PersonnelView />}
                            {activeTab === 'comms' && <CommunicationsView logs={logs} />}
                        </section>
                    </main>
                </div>
            );
        };

        const NavItem = ({ icon, label, active, onClick }) => (
            <button 
                onClick={onClick}
                className={`w-full flex items-center gap-4 px-6 py-4 transition-all border-l-2 ${active ? 'border-green-500 bg-green-500/10 text-green-400' : 'border-transparent text-green-900 hover:text-green-600'}`}
            >
                <Icon name={icon} className="w-4 h-4" />
                <span className="text-[11px] font-bold uppercase tracking-widest">{label}</span>
            </button>
        );

        const Dashboard = ({ logs }) => (
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fade-in">
                <div className="lg:col-span-2 border border-green-900 bg-black/40 p-4 h-[350px] relative flex items-center justify-center overflow-hidden">
                    <div className="absolute top-2 left-2 text-[9px] font-bold text-green-800 uppercase">SURVEILLANCE_RADAR.EXE</div>
                    <Icon name="alert-triangle" className="text-red-600 w-16 h-16 animate-bounce opacity-50" />
                    <div className="absolute inset-0 opacity-10 flex items-center justify-center pointer-events-none">
                        <svg viewBox="0 0 100 100" className="w-full h-full stroke-green-500 fill-none"><circle cx="50" cy="50" r="45" /><circle cx="50" cy="50" r="30" /><line x1="50" y1="0" x2="50" y2="100" /><line x1="0" y1="50" x2="100" y2="50" /></svg>
                    </div>
                </div>
                <div className="border border-green-900 bg-black/40 p-4">
                    <h3 className="text-xs font-bold border-b border-green-900 pb-2 mb-4 uppercase text-green-800">Statut des Sites</h3>
                    <div className="space-y-4">
                        <SiteStat name="Site-19" status="CRITIQUE" color="text-red-500" />
                        <SiteStat name="Site-17" status="STABLE" color="text-green-500" />
                        <SiteStat name="Site-01" status="SÉCURISÉ" color="text-green-500" />
                    </div>
                </div>
                <div className="lg:col-span-3 border border-green-900 bg-black/60 p-4">
                    <h3 className="text-[10px] font-bold uppercase text-green-800 border-b border-green-950 pb-2 mb-2">Flux de Données Temps Réel</h3>
                    <div className="font-mono text-[11px] space-y-1">
                        {logs.map((log, i) => (
                            <div key={i} className="flex gap-4 opacity-80">
                                <span className="text-green-900">[{new Date().toLocaleTimeString()}]</span>
                                <span className={i === 0 ? "text-green-400" : "text-green-700"}>{i === 0 ? "> " : "  "}{log}</span>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const SiteStat = ({ name, status, color }) => (
            <div className="flex justify-between items-center text-[11px]">
                <span className="font-bold">{name}</span>
                <span className={`${color} font-black`}>{status}</span>
            </div>
        );

        const SCPDossiers = () => (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {[
                    { id: 'SCP-173', class: 'Euclid', desc: 'Sculpture animée. Hostile.' },
                    { id: 'SCP-682', class: 'Keter', desc: 'Reptile indestructible. Haine extrême.' },
                    { id: 'SCP-096', class: 'Euclid', desc: 'Réagit si le visage est vu.' },
                    { id: 'SCP-999', class: 'Safe', desc: 'Masse de gelée. Amicale.' }
                ].map(scp => (
                    <div key={scp.id} className="border border-green-900 bg-black/40 p-4 hover:border-green-500 transition-colors">
                        <div className="flex justify-between items-start mb-2">
                            <h4 className="text-lg font-black tracking-tight text-green-400">{scp.id}</h4>
                            <span className="text-[9px] border border-green-900 px-1 uppercase text-green-700">{scp.class}</span>
                        </div>
                        <p className="text-[11px] italic text-green-800 mb-2">{scp.desc}</p>
                        <div className="flex justify-between items-center pt-2 border-t border-green-950">
                            <span className="text-[10px] uppercase text-green-900">Statut: Contenu</span>
                            <Icon name="eye" className="w-3 h-3 text-green-900" />
                        </div>
                    </div>
                ))}
            </div>
        );

        const MissionsView = () => (
            <div className="space-y-3">
                {[
                    { title: "OPÉRATION RIDEAU NOIR", risk: "HAUT", prog: 65 },
                    { title: "PROJET GHOST-WALKER", risk: "EXTRÊME", prog: 30 }
                ].map((m, i) => (
                    <div key={i} className="border border-green-900 bg-black/40 p-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <Icon name="target" className="w-5 h-5 text-orange-500" />
                            <div>
                                <h4 className="text-xs font-bold uppercase">{m.title}</h4>
                                <div className="w-32 h-1 bg-green-950 mt-1"><div className="h-full bg-green-500" style={{width: `${m.prog}%`}}></div></div>
                            </div>
                        </div>
                        <span className="text-[10px] font-black text-red-700">RISQUE: {m.risk}</span>
                    </div>
                ))}
            </div>
        );

        const PersonnelView = () => (
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
                {["Dr. Bright", "Agent Ulgrin", "Agent 04", "Dr. Gears", "Dr. Kondraki", "Classe-D"].map((n, i) => (
                    <div key={i} className="border border-green-900 p-4 bg-black/40 text-center group hover:bg-green-500/5 transition-all">
                        <Icon name="users" className="w-6 h-6 mx-auto mb-2 text-green-800 group-hover:text-green-500" />
                        <span className="text-[10px] font-bold uppercase">{n}</span>
                    </div>
                ))}
            </div>
        );

        const CommunicationsView = ({ logs }) => (
            <div className="flex flex-col h-full border border-green-900 bg-black/40 rounded-sm">
                <div className="p-3 border-b border-green-900 bg-green-500/5 text-[10px] font-bold">INTERCEPTIONS_VOIP.DB</div>
                <div className="flex-1 p-4 space-y-4 overflow-y-auto">
                    <div className="text-[11px]"><span className="text-green-800">[04:21] </span><span className="font-bold text-green-400">SYS: </span>Alerte Protocole 12-A activée.</div>
                    <div className="text-[11px]"><span className="text-green-800">[04:25] </span><span className="font-bold text-red-500">UNK: </span>Nous vous voyons.</div>
                    {logs.map((l, i) => <div key={i} className="text-[10px] text-green-900 border-l border-green-950 pl-2">INT_AUTO: {l}</div>)}
                </div>
                <div className="p-3 border-t border-green-900 flex gap-2">
                    <div className="text-green-500 text-xs py-1">&gt;</div>
                    <input type="text" placeholder="COMMANDE..." className="bg-transparent text-xs text-green-500 flex-1 outline-none uppercase placeholder:text-green-950" />
                    <Icon name="chevron-right" className="w-4 h-4 text-green-900" />
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
