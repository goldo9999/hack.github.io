<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Foundation Intelligence Terminal (SFIT)</title>
    <!-- Bibliothèques Externes -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #050505;
            color: #d1d5db;
            font-family: 'IBM Plex Mono', monospace;
            margin: 0;
            overflow: hidden;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .animate-scanline {
            animation: scanline 8s linear infinite;
        }

        .animate-spin-slow {
            animation: spin 6s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #050505;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1a2e1a;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #00ff9c;
        }

        .orbitron {
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icones SVG (Remplacement de Lucide pour autonomie totale) ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
                terminal: <><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></>,
                database: <><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>,
                map: <><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></>,
                users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                message: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>,
                activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
                lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                wifi: <><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></>,
                search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>
            };
            return (
                <svg 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name]}
                </svg>
            );
        };

        // --- Données ---
        const SCP_DATABASE = [
            { id: 'SCP-173', class: 'Euclid', title: 'La Sculpture', danger: 'Élevé', status: 'Confinement Stable' },
            { id: 'SCP-096', class: 'Euclid', title: 'L\'Homme Timide', danger: 'Critique', status: 'Confinement Stable' },
            { id: 'SCP-682', class: 'Keter', title: 'Reptile Difficile à Détruire', danger: 'Extrême', status: 'Brèche Probable' },
            { id: 'SCP-999', class: 'Sûr', title: 'Le Monstre de Chatouilles', danger: 'Nul', status: 'Libre circulation' },
            { id: 'SCP-106', class: 'Keter', title: 'Le Vieil Homme', danger: 'Critique', status: 'Inconnu' },
        ];

        // --- Sous-Composants ---

        const Scanlines = () => (
            <div className="pointer-events-none fixed inset-0 z-50 overflow-hidden">
                <div className="absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_2px,3px_100%]" />
                <div className="animate-scanline absolute inset-0 bg-[linear-gradient(to_bottom,transparent,rgba(0,255,156,0.05)_50%,transparent)] bg-[length:100%_200px]" />
            </div>
        );

        const Radar = () => (
            <div className="relative w-48 h-48 rounded-full border border-green-500/30 bg-green-900/5 overflow-hidden flex items-center justify-center">
                <div className="absolute inset-0 border border-green-500/20 rounded-full scale-75" />
                <div className="absolute inset-0 border border-green-500/20 rounded-full scale-50" />
                <div className="absolute w-[1px] h-full bg-green-500/20" />
                <div className="absolute h-[1px] w-full bg-green-500/20" />
                <div className="absolute inset-0 animate-spin-slow origin-center bg-[conic-gradient(from_0deg,transparent_0deg,rgba(0,255,156,0.2)_360deg)]" />
                <div className="absolute top-10 left-20 w-2 h-2 bg-green-400 rounded-full animate-pulse shadow-[0_0_8px_rgba(74,222,128,0.8)]" />
                <div className="absolute bottom-16 right-12 w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(239,68,68,0.8)]" />
            </div>
        );

        const TerminalLog = () => {
            const [logs, setLogs] = useState([
                "[SYSTEM] SFIT OS v4.0.2 Initialisé...",
                "[AUTH] Accès Niveau 4 confirmé.",
                "[INTEL] Interception de signal suspect sur Site-17.",
                "[NET] Cryptage 4096-bit activé."
            ]);

            useEffect(() => {
                const interval = setInterval(() => {
                    const messages = [
                        `[DATA] Paquet reçu de Agent_${Math.floor(Math.random() * 999)}`,
                        "[ALERT] Variation de Hume détectée en Zone-4",
                        "[SYS] Nettoyage des caches mémétiques...",
                        "[STATUS] SCP-682 est sous sédatifs",
                        "[COMMS] Transmission sécurisée entrante..."
                    ];
                    const newLog = messages[Math.floor(Math.random() * messages.length)];
                    setLogs(prev => [...prev.slice(-8), `${new Date().toLocaleTimeString()} ${newLog}`]);
                }, 3000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="bg-black/40 border border-green-900/50 p-3 font-mono text-[10px] h-48 overflow-hidden">
                    <div className="text-green-500/50 mb-2 uppercase tracking-widest border-b border-green-900/30 pb-1">Système Log</div>
                    {logs.map((log, i) => (
                        <div key={i} className="mb-1"><span className="text-green-500">{'>'}</span> {log}</div>
                    ))}
                    <div className="w-2 h-4 bg-green-500/50 inline-block animate-pulse ml-1 align-middle" />
                </div>
            );
        };

        const Dashboard = () => (
            <div className="grid grid-cols-12 gap-4 p-4">
                <div className="col-span-12 lg:col-span-8 bg-[#0D0D0D] border border-green-900/30 p-4 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1 h-full bg-red-600 shadow-[0_0_15px_rgba(220,38,38,0.5)]" />
                    <div className="flex justify-between items-start">
                        <div>
                            <h2 className="text-red-500 font-bold text-xl tracking-tighter uppercase italic orbitron">Niveau de Menace Global : CODE ROUGE</h2>
                            <p className="text-xs text-gray-500 mt-1 uppercase">Surveillance active de 14 brèches potentielles</p>
                        </div>
                        <div className="bg-red-950/30 border border-red-500/50 px-3 py-1 text-red-500 text-xs font-bold animate-pulse">CRITIQUE</div>
                    </div>
                    <div className="mt-6 h-48 flex items-end gap-1">
                        {[40, 65, 45, 90, 85, 40, 55, 70, 95, 30, 25, 60, 80, 90, 75].map((val, i) => (
                            <div key={i} className="flex-1 bg-red-900/20 relative group">
                                <div className="absolute bottom-0 left-0 right-0 bg-red-600/60 transition-all duration-500" style={{ height: `${val}%` }} />
                            </div>
                        ))}
                    </div>
                </div>

                <div className="col-span-12 lg:col-span-4 bg-[#0D0D0D] border border-green-900/30 p-4 flex flex-col items-center justify-center space-y-4">
                    <div className="w-full text-left text-[10px] text-green-500/50 font-mono">ANOMALY_RADAR_V2</div>
                    <Radar />
                    <div className="grid grid-cols-2 gap-4 w-full">
                        <div className="text-center p-2 border border-green-900/20">
                            <div className="text-[10px] text-gray-500 uppercase">Signatures</div>
                            <div className="text-green-500 font-bold">14</div>
                        </div>
                        <div className="text-center p-2 border border-green-900/20">
                            <div className="text-[10px] text-gray-500 uppercase">Vecteur</div>
                            <div className="text-amber-500 font-bold">NE-12</div>
                        </div>
                    </div>
                </div>

                <div className="col-span-12 lg:col-span-4"><TerminalLog /></div>
                
                <div className="col-span-12 lg:col-span-8 bg-[#0D0D0D] border border-green-900/30 p-4">
                    <h3 className="text-blue-400 font-bold text-sm flex items-center gap-2 mb-4">
                        <Icon name="activity" size={14} /> STATUT DES SITES MAJEURS
                    </h3>
                    <div className="space-y-3">
                        {['Site-19', 'Site-17', 'Site-64', 'Zone-02'].map((site, i) => (
                            <div key={site} className="flex items-center justify-between p-2 border border-blue-900/20 bg-blue-950/5">
                                <span className="text-xs text-blue-200">{site}</span>
                                <div className="flex-1 mx-4 h-1 bg-blue-900/20">
                                    <div className={`h-full ${i === 2 ? 'bg-amber-500 w-1/3' : 'bg-blue-500 w-full'}`} />
                                </div>
                                <span className={`text-[10px] font-bold ${i === 2 ? 'text-amber-500' : 'text-blue-500'}`}>
                                    {i === 2 ? 'ALERTE' : 'NOMINAL'}
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const SCPDatabase = () => (
            <div className="p-4 space-y-4">
                <div className="flex gap-4 items-center bg-black/40 border border-green-900/30 p-3">
                    <Icon name="search" size={18} className="text-green-500" />
                    <input type="text" placeholder="RECHERCHER DOSSIER..." className="bg-transparent border-none outline-none text-green-500 font-mono text-sm w-full" />
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                    {SCP_DATABASE.map(scp => (
                        <div key={scp.id} className="bg-[#0D0D0D] border border-green-900/20 hover:border-green-500/50 transition-colors p-4 relative">
                            <div className={`absolute top-0 right-0 p-1 px-3 text-[10px] font-bold ${
                                scp.class === 'Keter' ? 'bg-red-600' : scp.class === 'Euclid' ? 'bg-amber-600' : 'bg-blue-600'
                            }`}>
                                {scp.class.toUpperCase()}
                            </div>
                            <span className="text-green-500 font-bold text-lg">{scp.id}</span>
                            <div className="text-gray-400 text-xs font-bold mt-1 uppercase italic">{scp.title}</div>
                            <div className="mt-4 pt-4 border-t border-green-900/30 grid grid-cols-2 gap-2 text-[10px]">
                                <div><div className="text-gray-600">DANGER</div><div className="text-red-500">{scp.danger}</div></div>
                                <div><div className="text-gray-600">STATUT</div><div>{scp.status}</div></div>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const App = () => {
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [isSidebarOpen, setSidebarOpen] = useState(true);

            return (
                <div className="min-h-screen bg-[#050505] text-gray-300 flex overflow-hidden">
                    <Scanlines />
                    
                    {/* Sidebar */}
                    <aside className={`${isSidebarOpen ? 'w-64' : 'w-20'} transition-all duration-300 border-r border-green-900/30 bg-[#080808] flex flex-col z-40`}>
                        <div className="p-6 border-b border-green-900/30 flex items-center gap-3 overflow-hidden">
                            <div className="min-w-[32px] w-8 h-8 rounded-full border-2 border-green-500 flex items-center justify-center shadow-[0_0_10px_rgba(0,255,156,0.5)]">
                                <Icon name="shield" size={18} className="text-green-500" />
                            </div>
                            {isSidebarOpen && <div className="orbitron text-green-500 font-bold text-xs tracking-tighter">SFIT TERMINAL</div>}
                        </div>

                        <nav className="flex-1 mt-8 space-y-2 px-3">
                            {[
                                { id: 'dashboard', label: 'Dashboard', icon: 'shield' },
                                { id: 'files', label: 'Dossiers SCP', icon: 'database' },
                                { id: 'missions', label: 'Missions', icon: 'map' },
                                { id: 'personnel', label: 'Personnel', icon: 'users' },
                                { id: 'comms', label: 'Comms', icon: 'message' },
                            ].map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setCurrentPage(item.id)}
                                    className={`w-full flex items-center gap-4 p-3 transition-all ${
                                        currentPage === item.id ? 'bg-green-500/10 text-green-500 border-r-2 border-green-500' : 'text-gray-600 hover:text-green-500 hover:bg-green-500/5'
                                    }`}
                                >
                                    <Icon name={item.icon} size={20} />
                                    {isSidebarOpen && <span className="text-[10px] font-bold uppercase tracking-widest">{item.label}</span>}
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* Content */}
                    <div className="flex-1 flex flex-col overflow-hidden">
                        <header className="h-16 border-b border-green-900/30 bg-[#080808]/80 backdrop-blur-sm flex items-center justify-between px-6 z-30">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setSidebarOpen(!isSidebarOpen)} className="text-green-500"><Icon name="terminal" size={20} /></button>
                                <div className="flex flex-col ml-4">
                                    <span className="text-[10px] text-gray-500">OPERATEUR :</span>
                                    <span className="text-xs text-green-500 font-bold orbitron">ADMIN_ID-984</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-4 text-green-500">
                                <Icon name="wifi" size={14} className="animate-pulse" />
                                <span className="text-xs font-bold">{new Date().toLocaleTimeString()}</span>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto custom-scrollbar">
                            <div className="h-1 w-full bg-[repeating-linear-gradient(90deg,transparent,transparent_20px,rgba(0,255,156,0.1)_20px,rgba(0,255,156,0.1)_40px)]" />
                            {currentPage === 'dashboard' && <Dashboard />}
                            {currentPage === 'files' && <SCPDatabase />}
                            {currentPage === 'missions' && <div className="p-20 text-center opacity-30 italic">DONNÉES MTF SOUS PROTOCOLE FANTÔME</div>}
                        </main>

                        <footer className="h-8 border-t border-green-900/30 bg-[#080808] flex items-center justify-between px-4 text-[9px] text-gray-600 font-bold tracking-widest">
                            <div>SYSTEM: NOMINAL | ENCRYPTION: 100%</div>
                            <div className="flex items-center gap-2 text-amber-500 uppercase"><Icon name="zap" size={10} /> O5-COUNCIL LINK ACTIVE</div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
